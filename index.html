        .game-container {
            position: relative; width: 100%; max-width: 800px;

            box-shadow: 0 0 30px rgba(0,240,255,0.5), 0 0 80px rgba(0,240,255,0.1);
            background: #05080f;
            overflow: hidden;
            border-radius: 4px;
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #overlay {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.88);
            display: none; flex-direction: column;

        #overlay h1 { font-size: 36px; margin-bottom: 10px; text-shadow: 0 0 20px currentColor; animation: pulse 0.6s ease infinite alternate; }

        .progress-bar-wrap { width: 100%; max-width: 800px; display: flex; align-items: center; margin: 10px 0; background: #0a0f18; border: 1px solid rgba(0,240,255,0.3); border-radius: 6px; padding: 5px; }

        .level-selector { width: 100%; max-width: 800px; display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }

        .lvl-btn.done { background: rgba(0,255,136,0.08); border-color: #00ff88; color: #00ff88; cursor: pointer; }

        .play-btn-row { width: 100%; max-width: 800px; margin-bottom: 20px; }
        .play-btn { width: 100%; padding: 14px; background: transparent; border: 2px solid #00f0ff; color: #00f0ff; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 6px; letter-spacing: 2px; font-family: 'Courier New', monospace; transition: all 0.2s; }
        .play-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 20px #00f0ff; }

        .slot-machine { width: 100%; max-width: 800px; border: 2px solid var(--gold); border-radius: 8px; padding: 20px; text-align: center; background: linear-gradient(180deg, #1a1a10, #0d1100); box-shadow: 0 0 20px rgba(255,215,0,0.2); margin-bottom: 20px; }
        .slot-title { color: var(--gold); font-size: 22px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px var(--gold); }

        @keyframes fastSpin { 0% { transform: translateY(-40px); } 100% { transform: translateY(40px); } }
        .spin-btn { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 10px; width: 100%; max-width: 300px; }
        .spin-btn:disabled { background: #555; color: #222; cursor: not-allowed; }
        .slot-info { font-size: 14px; color: #ccc; margin-top: 5px; }
        .odds-bar { font-size: 12px; color: #888; margin-top: 15px; }

        .leaderboard { width: 100%; max-width: 800px; border: 1px solid var(--cyan); border-radius: 4px; padding: 15px; background: rgba(13,17,23,0.9); }
        .lb-title { color: var(--cyan); text-align: center; font-weight: bold; margin-bottom: 15px; font-size: 18px; }
        .lb-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #222; font-size: 14px; }
        #walletStatus { font-size: 12px; color: #888; margin-top: 20px; text-align: center; margin-bottom: 40px; }
        .toast { position: fixed; top: 20px; right: 20px; background: #222; color: #fff; padding: 15px; border-left: 4px solid var(--cyan); display: none; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

<script>
// ==========================================
// CONFIG & WEB3
// ==========================================
const CONTRACT_ADDRESS = "0x9f56f4cD6225D02d528A415206A9ae89352a761d";
let userAddress = null;
let provider = null;

const SELECTORS = {
    spin: "0x1515bc2b",
    levelComplete: "0x6c6e75b7",
    recordAttempt: "0x0047fb42",
    getLeaderboard: "0x716616a2",
    getSpinStatus: "0x280261cb"
};

function pad32(val) { return val.toString(16).padStart(64, '0'); }
function showToast(msg, color='var(--cyan)') {
    const t = document.getElementById('toast');
    t.innerText = msg; t.style.borderLeftColor = color; t.style.display = 'block';
    setTimeout(() => t.style.display='none', 3000);
}
function showWalletStatus(msg, isGood) {
    const w = document.getElementById('walletStatus');
    w.innerText = msg; w.style.color = isGood ? '#00ff88' : '#ff3060';
}

window.addEventListener('load', async () => {
    buildLevelUI();
    if (!window.ethereum) { showWalletStatus("Open in Warpcast or install MetaMask", false); return; }
    try {
        provider = window.ethereum;
        const accounts = await provider.request({method: 'eth_requestAccounts'});
        userAddress = accounts[0];
        try { await provider.request({method: 'wallet_switchEthereumChain', params: [{chainId: '0xa4b1'}]}); }
        catch (e) {
            if (e.code === 4902) {
                await provider.request({ method: 'wallet_addEthereumChain', params: [{ chainId: '0xa4b1', chainName: 'Arbitrum One', nativeCurrency: {name:'ETH',symbol:'ETH',decimals:18}, rpcUrls: ['https://arb1.arbitrum.io/rpc'], blockExplorerUrls: ['https://arbiscan.io'] }]});
            }
        }
        showWalletStatus(`✓ ${userAddress.slice(0,6)}...${userAddress.slice(-4)} · Arbitrum`, true);
        if (CONTRACT_ADDRESS !== "REPLACE_AFTER_DEPLOY") { fetchSpinStatus(); fetchLeaderboard(); setInterval(fetchLeaderboard, 30000); }
    } catch(e) { showWalletStatus("Wallet connection failed", false); }
});

// ==========================================
// AUDIO
// ==========================================
let ac = null;
function initAudio() { if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)(); if(ac.state==='suspended') ac.resume(); }
function playJump() {
    if(!ac) return; const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(440,ac.currentTime); o.frequency.exponentialRampToValueAtTime(880,ac.currentTime+0.1);
    g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.15);
    o.start(); o.stop(ac.currentTime+0.15);
}
function playDie() {
    if(!ac) return; const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination);
    o.type='sawtooth'; o.frequency.setValueAtTime(220,ac.currentTime); o.frequency.exponentialRampToValueAtTime(55,ac.currentTime+0.3);
    g.gain.setValueAtTime(0.2,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3);
    o.start(); o.stop(ac.currentTime+0.3);
}
function playWin() {
    if(!ac) return; [523,659,784,1047].forEach((f,i) => {
        const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=f;
        g.gain.setValueAtTime(0.15,ac.currentTime+i*0.12); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.2);
        o.start(ac.currentTime+i*0.12); o.stop(ac.currentTime+i*0.12+0.25);
    });
}

// ==========================================
// LEVEL DATA
// ==========================================
const LVL_CONFIG = [
    {id:1, speed:4.5, len:40000}, {id:2, speed:5.0, len:50000}, {id:3, speed:5.2, len:55000},
    {id:4, speed:5.5, len:60000}, {id:5, speed:5.8, len:65000}, {id:6, speed:6.2, len:70000},
    {id:7, speed:6.5, len:75000}, {id:8, speed:6.8, len:80000}, {id:9, speed:7.2, len:85000},
    {id:10, speed:7.5, len:100000}
];
const PLAT_LOW=240, PLAT_MID=180, PLAT_HIGH=120;

function pseudoRand(x, seed) {
    let v = Math.sin(x * seed * 0.00137 + seed * 31.7) * 43758.5453;
    return v - Math.floor(v);
}

function buildLevelObstacles(levelNum) {
    let obs=[]; let curX=600;
    let len=LVL_CONFIG[levelNum-1].len;

    if(levelNum===1){
        while(curX<len-1000){
            let r=pseudoRand(curX,levelNum);
            if(r<0.4){ obs.push({t:'spike',x:curX}); curX+=380; }
            else if(r<0.7){ obs.push({t:'dspike',x:curX}); curX+=420; }
            else{
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+40});
                obs.push({t:'platform',x:curX-10,y:PLAT_LOW,w:180});
                obs.push({t:'spike',x:curX+50},{t:'spike',x:curX+90},{t:'spike',x:curX+185});
                curX+=500;
            }
        }
    } else if(levelNum===2){
        while(curX<len-1000){
            obs.push({t:'spike',x:curX}); curX+=340;
            obs.push({t:'spike',x:curX}); curX+=300;
            obs.push({t:'spike',x:curX},{t:'spike',x:curX+40});
            obs.push({t:'platform',x:curX-20,y:PLAT_LOW,w:200});
            obs.push({t:'spike',x:curX+60},{t:'spike',x:curX+100},{t:'spike',x:curX+140},{t:'spike',x:curX+210});
            curX+=560;
        }
    } else if(levelNum===3){
        while(curX<len-1000){
            let r=pseudoRand(curX,levelNum);
            if(r<0.33){
                obs.push({t:'spike',x:curX},{t:'cspike',x:curX+160},{t:'spike',x:curX+200}); curX+=480;
            } else if(r<0.66){
                obs.push({t:'platform',x:curX,y:PLAT_LOW,w:200});
                obs.push({t:'spike',x:curX+40},{t:'spike',x:curX+80});
                obs.push({t:'cspike',x:curX+50},{t:'cspike',x:curX+90});
                obs.push({t:'spike',x:curX+210}); curX+=540;
            } else {
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+40});
                obs.push({t:'platform',x:curX+60,y:PLAT_LOW,w:140});
                obs.push({t:'platform',x:curX+250,y:PLAT_MID,w:130});
                obs.push({t:'spike',x:curX+290,onPlatY:PLAT_MID});
                obs.push({t:'spike',x:curX+420}); curX+=600;
            }
        }
    } else if(levelNum===4){
        while(curX<len-1000){
            let r=pseudoRand(curX,levelNum);
            if(r<0.35){
                obs.push({t:'spike',x:curX});
                obs.push({t:'gap',x:curX+60,w:140});
                obs.push({t:'platform',x:curX+30,y:235,w:200});
                obs.push({t:'spike',x:curX+100,onPlatY:235});
                obs.push({t:'spike',x:curX+240}); curX+=580;
            } else if(r<0.65){
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+40});
                obs.push({t:'mplatf',x:curX+100,y:230,w:120,amp:65,spd:0.035});
                obs.push({t:'spike',x:curX+180},{t:'spike',x:curX+220},{t:'spike',x:curX+300}); curX+=560;
            } else {
                obs.push({t:'gap',x:curX,w:110});
                obs.push({t:'platform',x:curX-20,y:235,w:160});
                obs.push({t:'gap',x:curX+300,w:110});
                obs.push({t:'mplatf',x:curX+280,y:235,w:150,amp:55,spd:0.03}); curX+=700;
            }
        }
    } else if(levelNum===5){
        while(curX<len-1000){
            let r=pseudoRand(curX,levelNum);
            if(r<0.3){
                obs.push({t:'gorb',x:curX,y:260});
                obs.push({t:'spike',x:curX+100},{t:'spike',x:curX+200});
                obs.push({t:'gorb',x:curX+350,y:160});
                obs.push({t:'spike',x:curX+450}); curX+=700;
            } else if(r<0.6){
                obs.push({t:'spike',x:curX},{t:'dspike',x:curX+60});
                obs.push({t:'platform',x:curX+20,y:235,w:220});
                obs.push({t:'spike',x:curX+80,onPlatY:235},{t:'spike',x:curX+130,onPlatY:235});
                obs.push({t:'spike',x:curX+250}); curX+=580;
            } else {
                obs.push({t:'gap',x:curX,w:130});
                obs.push({t:'mplatf',x:curX-10,y:235,w:120,amp:70,spd:0.04});
                obs.push({t:'gap',x:curX+280,w:130});
                obs.push({t:'mplatf',x:curX+270,y:235,w:120,amp:70,spd:0.04});
                obs.push({t:'dspike',x:curX+500}); curX+=720;
            }
        }
    } else {
        let minS=Math.max(260,360-levelNum*15);
        while(curX<len-1000){
            let r=pseudoRand(curX,levelNum);
            let sec=Math.floor(r*8);
            if(sec===0){
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+minS},{t:'dspike',x:curX+minS*2});
                curX+=minS*3+100;
            } else if(sec===1){
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+40});
                obs.push({t:'platform',x:curX-20,y:235,w:220});
                obs.push({t:'spike',x:curX+70,onPlatY:235},{t:'spike',x:curX+120,onPlatY:235});
                obs.push({t:'spike',x:curX+230}); curX+=minS*2+200;
            } else if(sec===2){
                obs.push({t:'spike',x:curX},{t:'spike',x:curX+50},{t:'spike',x:curX+100});
                obs.push({t:'mplatf',x:curX+30,y:230,w:120,amp:70,spd:0.04});
                obs.push({t:'spike',x:curX+200},{t:'spike',x:curX+250});
                obs.push({t:'mplatf',x:curX+230,y:230,w:120,amp:70,spd:0.04});
                obs.push({t:'spike',x:curX+400}); curX+=minS*2+280;
            } else if(sec===3){
                obs.push({t:'spike',x:curX});
                obs.push({t:'platform',x:curX+60,y:245,w:150});
                obs.push({t:'cspike',x:curX+90});
                obs.push({t:'platform',x:curX+260,y:PLAT_MID,w:130});
                obs.push({t:'spike',x:curX+290,onPlatY:PLAT_MID});
                obs.push({t:'spike',x:curX+430}); curX+=minS*2+250;
            } else if(sec===4){
                obs.push({t:'gap',x:curX,w:130});
                obs.push({t:'platform',x:curX-20,y:235,w:190});
                obs.push({t:'spike',x:curX+60,onPlatY:235});
                obs.push({t:'spike',x:curX+200}); curX+=minS+300;
            } else if(sec===5){
                obs.push({t:'gorb',x:curX,y:255});
                obs.push({t:'spike',x:curX+120},{t:'spike',x:curX+200});
                obs.push({t:'gorb',x:curX+320,y:155});
                obs.push({t:'spike',x:curX+440}); curX+=minS*2+250;
            } else if(sec===6){
                obs.push({t:'jpad',x:curX});
                obs.push({t:'cspike',x:curX+100},{t:'cspike',x:curX+150});
                obs.push({t:'spike',x:curX+280},{t:'spike',x:curX+320}); curX+=minS+280;
            } else {
                obs.push({t:'dspike',x:curX});
                obs.push({t:'gap',x:curX+minS,w:120});
                obs.push({t:'mplatf',x:curX+minS-30,y:235,w:110,amp:75,spd:0.045});
                obs.push({t:'spike',x:curX+minS+110,onPlatY:235});
                obs.push({t:'spike',x:curX+minS*2+60}); curX+=minS*2+200;
            }
        }
    }
    return obs;
}

// GAME ENGINE
// ==========================================
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
let reqAnimId;
const GAME_W=800,GAME_H=400,GROUND_Y=320,CEILING_Y=10;
const GRAVITY=0.60,JUMP_VEL=-13.5,MAX_VEL=16;

let gameState='idle';
let currentLevel=1,attemptCount=0,totalScore=0;
let scrollSpeed=4.5,levelLength=40000;
let worldX=0,frameCount=0,bgOffset=0,shake=0;
let player={x:130,y:GROUND_Y-36,w:36,h:36,vy:0,rot:0,ground:true,prevY:GROUND_Y-36};
let isGravityFlipped=false,flipTimer=0;
let ghostTrail=[],particles=[],obstacles=[];
let unlockedLevels=new Set([1]),completedLevels=new Set();
let localBonusSpins=0;

function buildLevelUI(){
    const grid=document.getElementById('levelGrid'); grid.innerHTML='';
    for(let i=1;i<=10;i++){
        const btn=document.createElement('button');
        if(completedLevels.has(i)){ btn.className='lvl-btn done'; btn.innerText='✓'+i; btn.onclick=()=>selectLevel(i); }
        else if(unlockedLevels.has(i)){ btn.className='lvl-btn unlocked'+(i===currentLevel?' active':''); btn.innerText=i; btn.onclick=()=>selectLevel(i); }
        else{ btn.className='lvl-btn'; btn.innerText='🔒'; btn.disabled=true; }
        grid.appendChild(btn);
    }
}
function selectLevel(n){ currentLevel=n; buildLevelUI(); document.getElementById('progressText').innerText=`Level ${n}/10`; }

function jump(){
    initAudio();
    if(gameState==='dead'||gameState==='idle'){ startOrRestartGame(); return; }
    if(gameState!=='playing') return;
    if(player.ground){
        player.vy=isGravityFlipped ? -JUMP_VEL : JUMP_VEL;
        player.ground=false;
        playJump();
    }
}

document.addEventListener('keydown',e=>{ if(e.code==='Space'){e.preventDefault();jump();} });
canvas.addEventListener('mousedown',jump);
canvas.addEventListener('touchstart',e=>{e.preventDefault();jump();},{passive:false});

function startOrRestartGame(){
    initAudio();
    cancelAnimationFrame(reqAnimId);
    let cfg=LVL_CONFIG[currentLevel-1];
    scrollSpeed=cfg.speed; levelLength=cfg.len;
    obstacles=buildLevelObstacles(currentLevel);
    worldX=0; frameCount=0; bgOffset=0; shake=0;
    player={x:130,y:GROUND_Y-36,w:36,h:36,vy:0,rot:0,ground:true,prevY:GROUND_Y-36};
    isGravityFlipped=false; flipTimer=0;
    ghostTrail=[]; particles=[];
    gameState='playing';
    document.getElementById('overlay').style.display='none';
    document.getElementById('progressBar').style.width='0%';
    loop();
}

function claimSpin(){
    document.getElementById('overlay').style.display='none';
    document.querySelector('.slot-machine').scrollIntoView({behavior:'smooth'});
}

function die(){
    if(gameState==='dead') return;
    gameState='dead'; attemptCount++;
    document.getElementById('attemptUI').innerText=`Attempt: ${attemptCount}`;
    playDie(); shake=15;
    let cols=['#00f0ff','#ff3060','#ffd700','#ffffff','#a200ff'];
    for(let i=0;i<40;i++) particles.push({x:player.x+18,y:player.y+18,vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,life:1.2,col:cols[Math.floor(Math.random()*cols.length)],size:3+Math.random()*4});
    if(CONTRACT_ADDRESS!=="REPLACE_AFTER_DEPLOY"&&userAddress&&provider)
        provider.request({method:'eth_sendTransaction',params:[{from:userAddress,to:CONTRACT_ADDRESS,data:SELECTORS.recordAttempt}]}).catch(()=>{});
}

function triggerWin(){
    gameState='clear'; playWin();
    completedLevels.add(currentLevel);
    if(currentLevel<10) unlockedLevels.add(currentLevel+1);
    buildLevelUI();
    let addScore=currentLevel*500; totalScore+=addScore;
    document.getElementById('scoreUI').innerText=`Score: ${totalScore}`;
    localBonusSpins++; updateSpinUI(false,3600,localBonusSpins);
    let cols=['#00f0ff','#ff3060','#ffd700','#ffffff','#00ff88'];
    for(let i=0;i<150;i++) particles.push({x:Math.random()*GAME_W,y:-20-Math.random()*100,vx:(Math.random()-0.5)*4,vy:2+Math.random()*5,life:3.0,col:cols[Math.floor(Math.random()*cols.length)],size:5+Math.random()*5});
    document.getElementById('overlayTitle').innerText=`✨ LEVEL ${currentLevel} CLEAR! ✨`;
    document.getElementById('overlayTitle').style.color='#00ff88';
    document.getElementById('overlaySub').innerText=`+${addScore} PTS \n 🎰 +1 FREE SPIN EARNED!`;
    document.getElementById('overlay').style.display='flex';
    if(CONTRACT_ADDRESS!=="REPLACE_AFTER_DEPLOY"&&userAddress&&provider){
        let data=SELECTORS.levelComplete+pad32(currentLevel)+pad32(addScore);
        provider.request({method:'eth_sendTransaction',params:[{from:userAddress,to:CONTRACT_ADDRESS,data}]}).catch(()=>{});
    }
}

function AABB(x1,y1,w1,h1,x2,y2,w2,h2){ return x1<x2+w2&&x1+w1>x2&&y1<y2+h2&&y1+h1>y2; }

function update(){
    if(gameState!=='playing') return;
    frameCount++; worldX+=scrollSpeed; bgOffset+=scrollSpeed*0.5;
    if(frameCount%60===0){ totalScore+=10; document.getElementById('scoreUI').innerText=`Score: ${totalScore}`; }
    if(frameCount%10===0) document.getElementById('progressBar').style.width=Math.min(100,(worldX/levelLength)*100)+'%';
    if(worldX>=levelLength){ triggerWin(); return; }
    if(frameCount%3===0){ ghostTrail.push({x:player.x,y:player.y,rot:player.rot}); if(ghostTrail.length>8) ghostTrail.shift(); }
    if(isGravityFlipped&&flipTimer>0){ flipTimer--; if(flipTimer===0) isGravityFlipped=false; }

    player.prevY=player.y;
    let g=isGravityFlipped?-GRAVITY:GRAVITY;
    player.vy+=g;
    if(player.vy>MAX_VEL) player.vy=MAX_VEL;
    if(player.vy<-MAX_VEL) player.vy=-MAX_VEL;
    player.y+=player.vy;
    if(!player.ground) player.rot+=7;

    let px=player.x+6,py=player.y+6,pw=24,ph=24;
    let onPlatform=false,overGap=false;

    for(let o of obstacles){
        let ox=o.x-worldX;
        if(ox<-200||ox>GAME_W+100) continue;

        let oy=o.y;
        if(o.t==='mplatf'){ o.phase=(o.phase||0)+o.spd; oy=o.y+Math.sin(o.phase)*o.amp; }

        if(o.t==='gap'){
            if(player.x+18>ox&&player.x+18<ox+o.w) overGap=true;
            continue;
        }

        let oHX,oHY,oHW,oHH;
        if(o.t==='spike'){
            let bY=(o.onPlatY!==undefined)?o.onPlatY:GROUND_Y;
            oHX=ox+6; oHY=bY-32; oHW=26; oHH=32;
        } else if(o.t==='cspike'){ oHX=ox+6; oHY=CEILING_Y; oHW=26; oHH=32; }
        else if(o.t==='dspike'){ oHX=ox+6; oHY=GROUND_Y-32; oHW=64; oHH=32; }
        else if(o.t==='platform'||o.t==='mplatf'){ oHX=ox; oHY=oy; oHW=o.w; oHH=16; }
        else if(o.t==='block'){ oHX=ox; oHY=o.y; oHW=o.w; oHH=o.h; }
        else if(o.t==='jpad'){ oHX=ox+4; oHY=GROUND_Y-10; oHW=30; oHH=10; }
        else if(o.t==='gorb'){ oHX=ox-15; oHY=o.y-15; oHW=30; oHH=30; }
        else continue;

        if(AABB(px,py,pw,ph,oHX,oHY,oHW,oHH)){
            if(o.t==='spike'||o.t==='dspike'||o.t==='cspike'||o.t==='block'){ die(); return; }
            if(o.t==='jpad'){ player.vy=JUMP_VEL*1.8; player.ground=false; }
            if(o.t==='gorb'&&!o.used){ isGravityFlipped=!isGravityFlipped; flipTimer=180; o.used=true; }

            if(o.t==='platform'||o.t==='mplatf'){
                if(!isGravityFlipped){
                    // ═══ PLATFORM JUMP FIX ═══
                    // Case 1: Landing on top (falling down onto platform)
                    if(player.prevY+player.h<=oy+8 && player.vy>=0){
                        player.y=oy-player.h;
                        player.vy=0;
                        player.ground=true;   // CAN JUMP AGAIN ✅
                        onPlatform=true;
                        player.rot=Math.round(player.rot/90)*90;
                    }
                    // Case 2: Just jumped OFF platform, moving upward near top — SAFE, ignore
                    else if(player.vy<0 && player.y+player.h<=oy+16){
                        // Player jumped off, still near platform surface but going up
                        // Do NOT die — they just left the platform
                        onPlatform=false; // they left
                    }
                    // Case 3: Hit from side or bottom — die
                    else{
                        die(); return;
                    }
                } else {
                    // Flipped gravity — land on underside of platform
                    if(player.prevY>=oy+16-8 && player.vy<=0){
                        player.y=oy+16;
                        player.vy=0;
                        player.ground=true;   // CAN JUMP AGAIN ✅
                        onPlatform=true;
                        player.rot=Math.round(player.rot/90)*90;
                    }
                    else if(player.vy>0 && player.y>=oy-4){
                        // Just jumped off ceiling platform going down — SAFE
                        onPlatform=false;
                    }
                    else{ die(); return; }
                }
            }
        }
    }

    // ═══ GROUND / CEILING — only reset ground=false when NOT on platform ═══
    if(!isGravityFlipped){
        if(player.y+player.h>=GROUND_Y&&!overGap){
            player.y=GROUND_Y-player.h; player.vy=0; player.ground=true;
            player.rot=Math.round(player.rot/90)*90;
        } else if(player.y>GAME_H){ die(); }
        else if(!onPlatform && player.y+player.h<GROUND_Y){
            // Only go airborne if NOT standing on a platform
            player.ground=false;
        }
        // If onPlatform=true → keep player.ground=true (already set above)
    } else {
        if(player.y<=CEILING_Y){
            player.y=CEILING_Y; player.vy=0; player.ground=true;
            player.rot=Math.round(player.rot/90)*90;
        } else if(player.y>GAME_H){ die(); }
        else if(!onPlatform && player.y>CEILING_Y){
            player.ground=false;
        }
    }
}

// ==========================================
// DRAW
// ==========================================
function draw(){
    ctx.clearRect(0,0,GAME_W,GAME_H);
    ctx.save();
    if(shake>0){ ctx.translate((Math.random()-0.5)*shake,(Math.random()-0.5)*shake); shake--; }

    ctx.fillStyle='#05080f'; ctx.fillRect(0,0,GAME_W,GAME_H);
    ctx.strokeStyle='rgba(0,240,255,0.06)'; ctx.lineWidth=1;
    for(let i=0;i<GAME_W;i+=40){ ctx.beginPath(); ctx.moveTo(i-(bgOffset%40),0); ctx.lineTo(i-(bgOffset%40),GAME_H); ctx.stroke(); }
    for(let i=0;i<GAME_H;i+=40){ ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(GAME_W,i); ctx.stroke(); }

    ctx.fillStyle='#080d14'; ctx.fillRect(0,GROUND_Y,GAME_W,GAME_H-GROUND_Y);
    ctx.shadowBlur=15; ctx.shadowColor='#00f0ff'; ctx.strokeStyle='#00f0ff'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,GROUND_Y); ctx.lineTo(GAME_W,GROUND_Y); ctx.stroke();
    ctx.lineWidth=1; ctx.strokeStyle='rgba(0,240,255,0.3)';
    ctx.beginPath(); ctx.moveTo(0,CEILING_Y); ctx.lineTo(GAME_W,CEILING_Y); ctx.stroke();
    ctx.shadowBlur=0;

    for(let o of obstacles){
        let ox=o.x-worldX;
        if(ox<-100||ox>GAME_W+100) continue;

        if(o.t==='gap'){
            ctx.fillStyle='#000'; ctx.fillRect(ox,GROUND_Y,o.w,GAME_H-GROUND_Y);
            ctx.fillStyle='rgba(255,48,96,0.3)';
            ctx.fillRect(ox,GROUND_Y-4,3,8); ctx.fillRect(ox+o.w-3,GROUND_Y-4,3,8);
        } else if(o.t==='spike'){
            let bY=(o.onPlatY!==undefined)?o.onPlatY:GROUND_Y;
            ctx.shadowBlur=12; ctx.shadowColor='#ff3060'; ctx.fillStyle='#ff3060';
            ctx.beginPath(); ctx.moveTo(ox+19,bY-38); ctx.lineTo(ox+38,bY); ctx.lineTo(ox,bY); ctx.closePath(); ctx.fill();
            ctx.shadowBlur=0;
        } else if(o.t==='dspike'){
            ctx.shadowBlur=12; ctx.shadowColor='#ff3060'; ctx.fillStyle='#ff3060';
            ctx.beginPath(); ctx.moveTo(ox+19,GROUND_Y-38); ctx.lineTo(ox+38,GROUND_Y); ctx.lineTo(ox,GROUND_Y); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(ox+57,GROUND_Y-38); ctx.lineTo(ox+76,GROUND_Y); ctx.lineTo(ox+38,GROUND_Y); ctx.closePath(); ctx.fill();
            ctx.shadowBlur=0;
        } else if(o.t==='cspike'){
            ctx.shadowBlur=12; ctx.shadowColor='#ff3060'; ctx.fillStyle='#ff3060';
            ctx.beginPath(); ctx.moveTo(ox+19,CEILING_Y+38); ctx.lineTo(ox+38,CEILING_Y); ctx.lineTo(ox,CEILING_Y); ctx.closePath(); ctx.fill();
            ctx.shadowBlur=0;
        } else if(o.t==='platform'||o.t==='mplatf'){
            let oy=o.t==='mplatf'?o.y+Math.sin(o.phase||0)*o.amp:o.y;
            let bc=o.t==='mplatf'?'#ff7700':'#00ff88';
            ctx.fillStyle='#0d1e2e'; ctx.fillRect(ox,oy,o.w,16);
            ctx.shadowBlur=8; ctx.shadowColor=bc; ctx.strokeStyle=bc; ctx.lineWidth=2;
            ctx.strokeRect(ox,oy,o.w,16); ctx.shadowBlur=0;
        } else if(o.t==='block'){
            ctx.shadowBlur=8; ctx.shadowColor='#ff3060'; ctx.fillStyle='#cc2244';
            ctx.fillRect(ox,o.y,o.w,o.h); ctx.strokeStyle='#ff3060'; ctx.lineWidth=2;
            ctx.strokeRect(ox,o.y,o.w,o.h); ctx.shadowBlur=0;
        } else if(o.t==='jpad'){
            ctx.shadowBlur=15; ctx.shadowColor='#ffd700'; ctx.fillStyle='#ffd700';
            ctx.beginPath(); ctx.moveTo(ox+19,GROUND_Y-16); ctx.lineTo(ox+38,GROUND_Y); ctx.lineTo(ox,GROUND_Y); ctx.closePath(); ctx.fill();
            ctx.shadowBlur=0; ctx.fillStyle='#000'; ctx.font='bold 9px Courier'; ctx.textAlign='center';
            ctx.fillText('JUMP',ox+19,GROUND_Y-4);
        } else if(o.t==='gorb'){
            let pulse=0.7+0.3*Math.sin(frameCount*0.1);
            ctx.shadowBlur=20; ctx.shadowColor='#ff8800';
            ctx.fillStyle=o.used?'#333':`rgba(255,136,0,${pulse})`;
            ctx.beginPath(); ctx.arc(ox+15,o.y,15,0,Math.PI*2); ctx.fill();
            ctx.shadowBlur=0; ctx.fillStyle=o.used?'#666':'#fff';
            ctx.font='bold 14px Courier'; ctx.textAlign='center';
            ctx.fillText('G',ox+15,o.y+5);
        }
    }
    ctx.textAlign='left';

    // Ghost trail
    if(gameState==='playing'){
        ghostTrail.forEach((t,i)=>{
            ctx.save(); ctx.translate(t.x+18,t.y+18); ctx.rotate(t.rot*Math.PI/180);
            ctx.globalAlpha=0.12*(i/ghostTrail.length); ctx.fillStyle='#00f0ff';
            ctx.fillRect(-18,-18,36,36); ctx.restore();
        });
        ctx.globalAlpha=1;
    }

    // Player cube
    if(gameState!=='dead'){
        ctx.save(); ctx.translate(player.x+18,player.y+18); ctx.rotate(player.rot*Math.PI/180);
        ctx.shadowBlur=25; ctx.shadowColor='#00f0ff';
        ctx.fillStyle='#05080f'; ctx.fillRect(-18,-18,36,36);
        ctx.strokeStyle='#00f0ff'; ctx.lineWidth=3; ctx.strokeRect(-18,-18,36,36);
        ctx.shadowBlur=10; ctx.fillStyle='#00f0ff'; ctx.fillRect(-8,-8,16,16);
        ctx.shadowBlur=0; ctx.fillStyle='rgba(255,255,255,0.5)';
        ctx.fillRect(-15,-15,4,4); ctx.fillRect(11,-15,4,4);
        ctx.fillRect(-15,11,4,4); ctx.fillRect(11,11,4,4);
        ctx.restore();
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){
        let p=particles[i]; p.x+=p.vx; p.y+=p.vy;
        p.rot=(p.rot||0)+8;
        p.vy+=(gameState==='clear')?0.1:0.35;
        p.life-=(gameState==='clear')?0.005:0.018;
        if(p.life<=0||p.y>GAME_H+20){ particles.splice(i,1); continue; }
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.col;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size); ctx.restore();
    }
    ctx.globalAlpha=1;

    if(isGravityFlipped){
        ctx.fillStyle='rgba(255,136,0,0.08)'; ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.fillStyle='rgba(255,136,0,0.8)'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
        ctx.fillText('⚠ GRAVITY FLIPPED ⚠',GAME_W/2,28); ctx.textAlign='left';
    }

    if(gameState==='idle'){
        ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.shadowBlur=20; ctx.shadowColor='#00f0ff'; ctx.fillStyle='#00f0ff';
        ctx.font='bold 28px Courier New'; ctx.textAlign='center';
        ctx.fillText('CLICK / SPACE TO PLAY',GAME_W/2,GAME_H/2);
        ctx.shadowBlur=0; ctx.textAlign='left';
    }
    if(gameState==='dead'){
        ctx.fillStyle='rgba(255,48,96,0.12)'; ctx.fillRect(0,0,GAME_W,GAME_H);
        ctx.shadowBlur=18; ctx.shadowColor='#ff3060'; ctx.fillStyle='#ff3060';
        ctx.font='bold 34px Courier New'; ctx.textAlign='center';
        ctx.fillText('WASTED!',GAME_W/2,GAME_H/2-20);
        ctx.shadowBlur=0; ctx.fillStyle='#ccc'; ctx.font='16px Courier New';
        ctx.fillText('Click / Space to try again',GAME_W/2,GAME_H/2+20);
        ctx.fillStyle='#555'; ctx.font='13px Courier New';
        ctx.fillText(`Attempt ${attemptCount}`,GAME_W/2,GAME_H/2+50);
        ctx.textAlign='left';
    }
    ctx.restore();
}

function loop(){ update(); draw(); reqAnimId=requestAnimationFrame(loop); }
draw();

const symbols=['🔷','⭐','💎','🎯','🔥','👑','7️⃣','🌟'];
let timerInt=null;

function updateSpinUI(hasFree=false,timeLeft=0,bonus=0){
    if(bonus===0&&localBonusSpins>0) bonus=localBonusSpins;
    localBonusSpins=bonus;
    const btn=document.getElementById('spinBtn');
    clearInterval(timerInt);
    if(bonus>0){
        btn.disabled=false; btn.innerText=`🎰 SPIN (${bonus} bonus)`;
        document.getElementById('spinInfo').innerText=`Bonus spins: ${bonus}`; return;
    }
    if(hasFree){
        btn.disabled=false; btn.innerText='🎰 FREE SPIN!';
        document.getElementById('spinInfo').innerText='Free spin ready!'; return;
    }
    btn.disabled=true;
    let tl=timeLeft;
    timerInt=setInterval(()=>{
        if(tl<=0){ fetchSpinStatus(); clearInterval(timerInt); return; }
        tl--;
        let h=Math.floor(tl/3600),m=Math.floor((tl%3600)/60),s=tl%60;
        btn.innerText=`⏳ ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        document.getElementById('spinInfo').innerText=`Next free spin in ${h}h ${m}m`;
    },1000);
}

async function fetchSpinStatus(){
    if(!userAddress||CONTRACT_ADDRESS==="REPLACE_AFTER_DEPLOY") return;
    try{
        const res=await provider.request({method:'eth_call',params:[{to:CONTRACT_ADDRESS,data:SELECTORS.getSpinStatus+pad32(userAddress.replace('0x',''))},'latest']});
        if(res&&res!=='0x'){
            const c=res.replace('0x','');
            updateSpinUI(parseInt(c.substring(128,192),16)===1, parseInt(c.substring(192,256),16), parseInt(c.substring(64,128),16));
        }
    }catch(e){}
}

async function executeSpin(){
    const btn=document.getElementById('spinBtn');
    if(CONTRACT_ADDRESS==="REPLACE_AFTER_DEPLOY"){
        if(localBonusSpins<=0){ showToast("No spins available!"); return; }
        localBonusSpins--;
        updateSpinUI(false,3600,localBonusSpins);
        animateReels(0.042); return;
    }
    if(!userAddress){ showToast("Connect wallet first!"); return; }
    btn.disabled=true;
    try{
        await provider.request({method:'eth_sendTransaction',params:[{from:userAddress,to:CONTRACT_ADDRESS,data:SELECTORS.spin}]});
        animateReels(-1);
        setTimeout(()=>{ fetchSpinStatus(); document.getElementById('spinResult').innerText="Check wallet for ARB!"; },4000);
    }catch(e){ btn.disabled=false; if(e.code!==4001) showToast("Spin failed","red"); }
}

function animateReels(win){
    const r1=document.getElementById('r1'),r2=document.getElementById('r2'),r3=document.getElementById('r3');
    r1.className='reel-inner spinning'; r2.className='reel-inner spinning'; r3.className='reel-inner spinning';
    document.getElementById('spinResult').innerText='Spinning...';
    setTimeout(()=>{ r1.className='reel-inner'; r1.innerText=symbols[Math.floor(Math.random()*symbols.length)]; },2000);
    setTimeout(()=>{ r2.className='reel-inner'; r2.innerText=symbols[Math.floor(Math.random()*symbols.length)]; },2700);
    setTimeout(()=>{ r3.className='reel-inner'; r3.innerText=symbols[Math.floor(Math.random()*symbols.length)]; if(win>0) document.getElementById('spinResult').innerText=`YOU WON ${win} ARB! 🎉`; },3400);
}

async function fetchLeaderboard(){
    if(!userAddress||CONTRACT_ADDRESS==="REPLACE_AFTER_DEPLOY") return;
    try{
        const res=await provider.request({method:'eth_call',params:[{to:CONTRACT_ADDRESS,data:SELECTORS.getLeaderboard},'latest']});
        if(res&&res!=='0x'){
            const c=res.replace('0x',''); let html='';
            for(let i=0;i<10;i++){
                const addr='0x'+c.substring(i*64+24,i*64+64);
                if(addr==='0x0000000000000000000000000000000000000000') continue;
                const sc=parseInt(c.substring(640+i*64,640+i*64+64),16);
                const lv=parseInt(c.substring(1280+i*64,1280+i*64+64),16);
                html+=`<div class="lb-row"><span>#${i+1} ${addr.slice(0,6)}...${addr.slice(-4)}</span><span style="color:var(--cyan)">${sc} pts (Lvl ${lv})</span></div>`;
            }
            if(html) document.getElementById('lbContent').innerHTML=html;
        }
    }catch(e){}
}
</script>
</body>
</html>
